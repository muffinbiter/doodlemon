  const s=Math.min(innerWidth/W,innerHeight/H);
  document.getElementById('wrap').style.transform=`scale(${s})`;
};
resize(); addEventListener('resize',resize);

function getScale(){
  const m=document.getElementById('wrap').style.transform.match(/scale\(([^)]+)\)/);
  return m?parseFloat(m[1]):1;
}
function localXY(e,el){
  const r=el.getBoundingClientRect(),s=getScale();
  return{x:(e.clientX-r.left)/s,y:(e.clientY-r.top)/s};
}

function bx(x,y,w,h,fill,stroke,lw=2){
  G.fillStyle=fill;G.fillRect(x,y,w,h);
  if(stroke){G.strokeStyle=stroke;G.lineWidth=lw;G.strokeRect(x,y,w,h);}
}
function txt(t,x,y,sz,col,al='left'){
  G.font=`${sz}px NeoDGM`;G.fillStyle=col;G.textAlign=al;G.fillText(t,x,y);G.textAlign='left';
}
function hpBar(x,y,w,h,cur,max,col='#32CD32'){
  bx(x,y,w,h,'#1a1a1a','#555');
  const r=Math.max(0,cur/max);
  const c=r>0.5?col:r>0.25?'#FFD700':'#FF4500';
  G.fillStyle=c;G.fillRect(x+1,y+1,Math.max(0,(w-2)*r)|0,h-2);
}

// ── SPRITES ──
function spr(rows,pal,ox,oy,sz,flip=false){
  const W2=rows[0].length;
  for(let r=0;r<rows.length;r++) for(let c=0;c<W2;c++){
    const k=rows[r][c];
    if(k!=='.'&&pal[k]){G.fillStyle=pal[k];G.fillRect(ox+(flip?W2-1-c:c)*sz,oy+r*sz,sz,sz);}
  }
}

  '...FEEFFFE...',
  '...FFFFFFFF..',
  '..BBBBBBBBP..',
  '..BBBBBBBBP..',
  '..BBBBBBBPP..',

function drawPlayer(x,y,frame,dir){
  const f=Math.floor(frame/10)%2;
  const rows=PSPR.map((row,r)=>{
    if(r>=9&&r<=12){return f?(r%2===0?'...SB...BS...':'...BB...BB...'):(r%2===0?'...BB...BB...':'...SB...BS...');}
    return row;
  });
  spr(rows,PPAL,x,y,3,dir<0);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MARIO-STYLE TERRAIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawCloud(cx,cy,w,h,col1,col2){
  // Base puff
  G.fillStyle=col2;
  G.fillRect(cx-w*0.4|0, cy+h*0.3|0, w*0.8|0, h*0.7|0);
  // Top bumps
  [[0,0,0.3],[0.28,-0.18,0.22],[-.28,-0.1,0.2],[0.5,0.15,0.2],[-0.5,0.15,0.2]].forEach(([dx,dy,r])=>{
    G.fillStyle=col1;
    G.beginPath();G.arc(cx+dx*w,cy+dy*h,r*w,0,Math.PI*2);G.fill();
  });
  // Pixel outline dots (Mario style)
  G.fillStyle='rgba(255,255,255,0.4)';
  G.fillRect(cx-w*0.28|0,cy-h*0.25|0,4,3);
  G.fillRect(cx-w*0.1|0, cy-h*0.35|0,3,3);
}

function drawMarioTree(x,groundY,h,col1,col2,trunkCol){
  const tw=10, th=h*0.35|0;
  // Trunk pixel style
  G.fillStyle=trunkCol;G.fillRect(x-tw/2,groundY-th,tw,th);
  G.fillStyle='rgba(0,0,0,0.2)';G.fillRect(x+tw/2-3,groundY-th,3,th); // shadow
  // Canopy layers (3 tiers like Mario)
  const tiers=[
    {w:h*0.55|0,y:groundY-th-h*0.18|0},
    {w:h*0.42|0,y:groundY-th-h*0.38|0},
    {w:h*0.28|0,y:groundY-th-h*0.55|0},
  ];
  tiers.forEach(({w,y},i)=>{
    // Dark base
    G.fillStyle=col2;G.fillRect(x-w/2|0,y+4,w,h*0.22+4|0);
    // Bright top
    G.fillStyle=col1;G.fillRect(x-w/2|0,y,w,h*0.22|0);
    // Pixel shine
    G.fillStyle='rgba(255,255,255,0.25)';G.fillRect(x-w/2+4|0,y+2,6,4);
  });
}

function drawPipe(x,groundY,h,col1,col2){
  const pw=26,capH=10,capExtra=4;
  // Pipe body
  G.fillStyle=col2;G.fillRect(x,groundY-h,pw,h);
  G.fillStyle=col1;G.fillRect(x+2,groundY-h,pw-6,h);
  G.fillStyle='rgba(255,255,255,0.18)';G.fillRect(x+4,groundY-h+4,4,h-8);
  G.fillStyle='rgba(0,0,0,0.25)';G.fillRect(x+pw-5,groundY-h,5,h);
  // Cap
  G.fillStyle=col2;G.fillRect(x-capExtra,groundY-h,pw+capExtra*2,capH);
  G.fillStyle=col1;G.fillRect(x-capExtra+2,groundY-h,pw+capExtra*2-6,capH);
  G.fillStyle='rgba(255,255,255,0.2)';G.fillRect(x-capExtra+4,groundY-h+2,5,4);
}

function drawBrickGround(y,h,col1,col2,col3){
  // Base ground
  G.fillStyle=col1;G.fillRect(0,y,W,h);
  // Top grass layer
  G.fillStyle=col3;G.fillRect(0,y,W,8);
  G.fillStyle='rgba(255,255,255,0.15)';G.fillRect(0,y,W,3);
  // Brick lines (horizontal)
  G.fillStyle=col2;
  for(let row=0;row<3;row++) G.fillRect(0,y+8+row*14,W,2);
  // Brick vertical lines (alternating per row)
  for(let row=0;row<3;row++){
    const offset=row%2===0?0:22;
    for(let bx2=offset;bx2<W;bx2+=44) G.fillRect(bx2,y+8+row*14,2,14);
  }
}

function drawHill(cx,groundY,w,h,col1,col2){
  G.fillStyle=col2;
  G.beginPath();G.arc(cx,groundY,w/2,Math.PI,0);G.fill();
  G.fillStyle=col1;
  G.beginPath();G.arc(cx,groundY-h*0.15,w*0.55/2,Math.PI,0);G.fill();
  // Dots on hill (Mario style)
  G.fillStyle='rgba(255,255,255,0.25)';
  [[cx-w*0.1,groundY-h*0.4],[cx+w*0.15,groundY-h*0.25]].forEach(([px2,py2])=>{
    G.beginPath();G.arc(px2,py2,3,0,Math.PI*2);G.fill();
  });
}

function drawBrickBlock(x,y,sz,col1,col2){
  G.fillStyle=col2;G.fillRect(x,y,sz,sz);
  G.fillStyle=col1;G.fillRect(x+1,y+1,sz-3,sz-3);
  G.fillStyle='rgba(255,255,255,0.3)';G.fillRect(x+2,y+2,4,3);
  G.fillStyle='rgba(0,0,0,0.2)';G.fillRect(x+sz-4,y+sz-4,4,4);
  // Cross lines
  G.fillStyle=col2;G.fillRect(x,y+sz/2|0,sz,2);G.fillRect(x+sz/2|0,y,2,sz);
}

function drawQBlock(x,y,sz,lit){
  const c=lit?'#FFD700':'#C8A800';
  G.fillStyle=lit?'#FFA500':'#8B7000';G.fillRect(x,y,sz,sz);
  G.fillStyle=c;G.fillRect(x+1,y+1,sz-3,sz-3);
  G.fillStyle='rgba(255,255,255,0.35)';G.fillRect(x+2,y+2,6,4);
  G.fillStyle=lit?'#FFF':'#aa8800';
  G.font=`${sz*0.6}px NeoDGM`;G.textAlign='center';
  G.fillText('?',x+sz/2,y+sz*0.72);G.textAlign='left';
}

function drawSnowTree(x,groundY,h,col1,col2){
  const tw=8,th=h*0.3|0;
  G.fillStyle='#5C3D1E';G.fillRect(x-tw/2,groundY-th,tw,th);
  const tiers=[{w:h*0.55|0,y:groundY-th-h*0.2|0},{w:h*0.38|0,y:groundY-th-h*0.42|0},{w:h*0.22|0,y:groundY-th-h*0.6|0}];
  tiers.forEach(({w,y})=>{
    G.fillStyle=col2;G.fillRect(x-w/2|0,y+4,w,h*0.22+4|0);
    G.fillStyle=col1;G.fillRect(x-w/2|0,y,w,h*0.22|0);
    // Snow cap
    G.fillStyle='#e8f4fc';G.fillRect(x-w/2+2|0,y,w-4,5);
    G.fillStyle='rgba(255,255,255,0.6)';G.fillRect(x-w/2+4|0,y,6,3);
  });
}

function drawVolcano(x,groundY,w,h){
  // Body
  G.fillStyle='#4a2020';
  G.beginPath();G.moveTo(x,groundY);G.lineTo(x-w/2,groundY);G.lineTo(x-w*0.15,groundY-h);G.lineTo(x+w*0.15,groundY-h);G.lineTo(x+w/2,groundY);G.fill();
  // Rock texture lines
  G.fillStyle='rgba(0,0,0,0.2)';
  for(let i=1;i<4;i++) G.fillRect(x-w*(0.5-i*0.12)|0,groundY-h*i*0.25|0,2,h*0.2|0);
  // Lava glow at top
  G.fillStyle='#cc3300';G.fillRect(x-w*0.12|0,groundY-h-4,w*0.24|0,8);
  const glow=G.createLinearGradient(x,groundY-h-12,x,groundY-h+4);
  glow.addColorStop(0,'rgba(255,100,0,0)');glow.addColorStop(1,'rgba(255,60,0,0.7)');
  G.fillStyle=glow;G.fillRect(x-w*0.12|0,groundY-h-12,w*0.24|0,16);
  // Lava drips
  if(S.tick%60<30){G.fillStyle='#FF4500';G.fillRect(x-4,groundY-h,6,8+Math.floor(S.tick%30/5)*3);}
}

function drawTerrain(){
  const st=STAGES[S.stage];
  // Sky gradient
  const sky=G.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,st.sky1);sky.addColorStop(1,st.sky2);
  G.fillStyle=sky;G.fillRect(0,0,W,GY);

  if(S.stage===0){
    // == FOREST STAGE ==
    // Background hills
    drawHill(120,GY,200,55,'#7bc94a','#5aaf2a');
    drawHill(400,GY,160,45,'#7bc94a','#5aaf2a');
    drawHill(580,GY,130,38,'#6aba38','#4a9f1e');
    // Clouds
    drawCloud(100,45,80,30,'#ffffff','#e8e8e8');
    drawCloud(310,35,100,36,'#ffffff','#e0e0e0');
    drawCloud(530,48,75,28,'#ffffff','#e8e8e8');
    // Background trees (small, darker)
    [[50,GY,45,'#3a7a1a','#2a5a0a','#5C3D1E'],
     [180,GY,52,'#3a7a1a','#286010','#5C3D1E'],
     [480,GY,44,'#3a7a1a','#286010','#5C3D1E'],
     [600,GY,48,'#2a6a0a','#1a4a00','#4a2e0e']].forEach(a=>drawMarioTree(...a));
    // Floating bricks
    drawBrickBlock(200,GY-110,20,'#C8A000','#8B6914');
    drawBrickBlock(222,GY-110,20,'#C8A000','#8B6914');
    const qHit=S.qBlocks&&S.qBlocks[0]&&S.qBlocks[0].hit;
    drawQBlock(244,GY-110,20,!qHit);
    drawBrickBlock(266,GY-110,20,'#C8A000','#8B6914');
    // Pipes
    drawPipe(370,GY,52,st.pipe,st.pipeDark);
    drawPipe(520,GY,36,st.pipe,st.pipeDark);
    // Foreground trees
    drawMarioTree(280,GY,70,'#50aa28','#2a7a0a','#7a4a1a');
    // Ground bricks
    drawBrickGround(GY,H-GY,'#8B5E1A','#5a3a0a','#5aaf2a');

  } else if(S.stage===1){
    // == VOLCANO STAGE ==
    // Dark sky with ember particles
    for(let i=0;i<12;i++){
      const ex=(S.tick*1.5+i*55)%W;
      const ey=30+(Math.sin(S.tick*0.03+i)*50)|0;
      G.fillStyle=`rgba(255,${100+i*10},0,0.7)`;
      G.fillRect(ex,ey,2+i%3,2+i%2);
    }
    // Lava glow on ground
    const lavaGlow=G.createLinearGradient(0,GY-30,0,GY);
    lavaGlow.addColorStop(0,'rgba(255,80,0,0)');lavaGlow.addColorStop(1,'rgba(255,80,0,0.35)');
    G.fillStyle=lavaGlow;G.fillRect(0,GY-30,W,30);
    // Clouds (ashy)
    drawCloud(80,40,90,32,'#886655','#665544');
    drawCloud(380,32,110,38,'#776655','#554433');
    drawCloud(570,50,80,28,'#997766','#665544');
    // Volcanos BG
    drawVolcano(120,GY,180,115);
    drawVolcano(500,GY,140,90);
    // Rock platforms
    [[160,GY-70,80,20],[340,GY-90,60,18],[500,GY-60,70,18]].forEach(([rx,ry,rw,rh])=>{
      G.fillStyle='#5a2a00';G.fillRect(rx,ry,rw,rh);
      G.fillStyle='#8a4a10';G.fillRect(rx,ry,rw,6);
      G.fillStyle='rgba(255,80,0,0.2)';G.fillRect(rx,ry+rh-3,rw,3);
    });
    // Pipes (lava style)
    drawPipe(300,GY,44,st.pipe,st.pipeDark);
    drawPipe(460,GY,32,st.pipe,st.pipeDark);
    // Ground (dark rock with lava cracks)
    G.fillStyle='#2a0a00';G.fillRect(0,GY,W,H-GY);
    G.fillStyle='#3a1500';G.fillRect(0,GY,W,8);
    // Lava cracks
    G.fillStyle='#FF4500';
    [[60,GY+2,80,4],[200,GY+3,50,3],[350,GY+1,90,4],[530,GY+2,70,3]].forEach(([cx,cy,cw,ch])=>{
      G.fillRect(cx,cy,cw,ch);
      G.fillStyle='rgba(255,150,0,0.5)';G.fillRect(cx+2,cy+1,cw-4,ch-2);
      G.fillStyle='#FF4500';
    });

  } else {
    // == SNOW STAGE ==
    // Snowflakes
    for(let i=0;i<20;i++){
      const sx2=((S.tick*0.8+i*33)%W)|0;
      const sy2=((S.tick*0.4+i*18)%(GY-10))|0;
      G.fillStyle='rgba(255,255,255,0.7)';
      G.fillRect(sx2,sy2,2,2);G.fillRect(sx2+1,sy2+1,1,1);
    }
    // BG hills (snowy)
    G.fillStyle='#b8d8e8';
    G.beginPath();G.arc(130,GY,170,Math.PI,0);G.fill();
    G.beginPath();G.arc(430,GY,140,Math.PI,0);G.fill();
    // Snow caps on hills
    G.fillStyle='#e8f4fc';
    G.beginPath();G.arc(130,GY-80,90,Math.PI,0);G.fill();
    G.beginPath();G.arc(430,GY-65,72,Math.PI,0);G.fill();
    // Clouds (fluffy snow clouds)
    drawCloud(90,38,90,34,'#d8eef8','#c0d8ec');
    drawCloud(320,28,110,40,'#e0f0fc','#c8dff0');
    drawCloud(550,42,80,30,'#d8eef8','#c0d8ec');

function spawnWild(){

  let w;

  else{w={...WILD[Math.floor(Math.random()*WILD.length)]};}
  S.wild={...w,x:520,y:GY-32,maxHp:w.hp,alive:true};

function initExplore(){
  S.px=80;S.py=GY-45;S.pvx=0;S.pvy=0;S.ponGround=true;S.pFrame=0;S.pDir=1;
  S.fieldCoins=[];
  for(let i=0;i<7;i++) S.fieldCoins.push({x:140+i*68,y:GY-16,col:false});
  S.qBlocks=[{x:244,y:GY-110,hit:false}];
  S.popCoins=[];
  S.wild=null;
  if(S.mobsDefeated===undefined) S.mobsDefeated=0;
  setTimeout(spawnWild,2500);
}
function updateExplore(){
  const spd=3;
  if(KEYS['ArrowLeft']||KEYS['KeyA']||TOUCH_BTN.left){S.pvx=-spd;S.pDir=-1;}
  else if(KEYS['ArrowRight']||KEYS['KeyD']||TOUCH_BTN.right){S.pvx=spd;S.pDir=1;}
  else S.pvx*=0.5;
  if((KEYS['ArrowUp']||KEYS['Space']||KEYS['KeyW']||TOUCH_BTN.jump)&&S.ponGround){S.pvy=-11;S.ponGround=false;}
  S.pvy=Math.min(S.pvy+0.55,12);
  S.px+=S.pvx;S.py+=S.pvy;
  if(S.py>=GY-45){S.py=GY-45;S.pvy=0;S.ponGround=true;}
  S.px=Math.max(0,Math.min(W-39,S.px));
  if(Math.abs(S.pvx)>0.3) S.pFrame++;
  S.fieldCoins.forEach(c=>{if(!c.col&&Math.abs(S.px+19-c.x)<18&&Math.abs(S.py+22-c.y)<20){c.col=true;S.coins+=2;}});
  // Q Block collision - spawn collectible coin
  if(S.stage===0&&S.qBlocks){
    S.qBlocks.forEach(bl=>{
      if(!bl.hit&&S.pvy<0){
        const ph=S.px+6,pw2=S.px+33;
        if(ph<bl.x+20&&pw2>bl.x&&S.py<=bl.y+20&&S.py>bl.y){
          bl.hit=true;S.pvy=2;
          S.popCoins.push({x:bl.x+7,y:bl.y-14,vy:-4.5,collected:false});
        }
      }
    });
  }
  // Pop coins physics + collect
  S.popCoins.forEach(p=>{
    if(p.collected)return;
    p.y+=p.vy;p.vy+=0.35;
    if(p.y>=GY-14){p.y=GY-14;p.vy=0;}
    if(Math.abs(S.px+19-p.x)<20&&Math.abs(S.py+22-p.y)<24){p.collected=true;S.coins+=3;}
  });
  S.popCoins=S.popCoins.filter(p=>!p.collected);
  if(S.wild&&S.wild.alive){
    if(Math.abs(S.px+19-S.wild.x)<45&&Math.abs(S.py+22-S.wild.y)<40) startChoice();
    if(S.tick%90===0){S.wild.x+=Math.random()>0.5?10:-10;S.wild.x=Math.max(400,Math.min(590,S.wild.x));}
  }
}

function setupDrawEvents(){
  let lastX=0,lastY=0;
  function getPos(e){return localXY(e,dc);}
  function startStroke(e){
    const {x,y}=getPos(e);const {x:ax,y:ay,w,h}=DRAW_AREA;
    if(x<ax||x>ax+w||y<ay||y>ay+h)return;
    isDrawing=true;lastX=x;lastY=y;
    D.globalCompositeOperation=drawMode==='erase'?'destination-out':'source-over';
    D.strokeStyle=drawColor;D.lineWidth=drawSize;D.lineCap='round';D.lineJoin='round';
    D.beginPath();D.moveTo(x,y);D.lineTo(x+0.1,y);D.stroke();hasDrawn=true;
  }
  function moveStroke(e){
    if(!isDrawing)return;const {x,y}=getPos(e);const {x:ax,y:ay,w,h}=DRAW_AREA;
    if(x<ax||x>ax+w||y<ay||y>ay+h){isDrawing=false;return;}
    D.beginPath();D.moveTo(lastX,lastY);D.lineTo(x,y);D.stroke();lastX=x;lastY=y;
  }
  function endStroke(e){
    // 터치로 뗐을 때 탭(짧은 터치)이면 버튼/팔레트 처리
    if(e&&e.changedTouches&&!isDrawing){
      const t=e.changedTouches[0];
      clickHandle({clientX:t.clientX,clientY:t.clientY});
    }
    isDrawing=false;
  }
  function clickHandle(e){
    const {x,y}=getPos(e);if(S.screen!=='draw')return;
    const {x:ax,y:ay,w,h}=DRAW_AREA;const btnY2=ay+h+12;
    if(y>btnY2&&y<btnY2+26){
      if(x>ax&&x<ax+70) drawMode='draw';
      else if(x>ax+76&&x<ax+146) drawMode='erase';
      else if(x>ax+152&&x<ax+222){D.clearRect(ax,ay,w,h);hasDrawn=false;}
      else if(x>ax+228&&x<ax+298&&hasDrawn) finishDrawing();
      return;
    }
    const px2=ax+w+18,py2=ay;
    PALETTE.forEach((c,i)=>{
      const plx=px2+(i%2)*22,ply=py2+16+Math.floor(i/2)*22;
      if(x>plx&&x<plx+18&&y>ply&&y<ply+18){drawColor=c;drawMode='draw';}
    });
    [4,6,10].forEach((sz,i)=>{
      const bx2=px2+5+i*18,by2=py2+168;
      if(Math.hypot(x-bx2-sz/2,y-by2-sz/2)<sz+2) drawSize=sz;
    });
  }
  let touchStartX=0,touchStartY=0,touchMoved=false;
  dc.addEventListener('mousedown',e=>{e.preventDefault();startStroke(e);});
  dc.addEventListener('mousemove',e=>{e.preventDefault();moveStroke(e);});
  dc.addEventListener('mouseup',e=>{isDrawing=false;});
  dc.addEventListener('mouseleave',e=>{isDrawing=false;});
  dc.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    touchStartX=localXY(t,dc).x;touchStartY=localXY(t,dc).y;touchMoved=false;
    startStroke(t);
  },{passive:false});
  dc.addEventListener('touchmove',e=>{
    e.preventDefault();touchMoved=true;moveStroke(e.touches[0]);
  },{passive:false});
  dc.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!touchMoved){
      // 탭 — 버튼/팔레트 처리
      const t=e.changedTouches[0];
      clickHandle({clientX:t.clientX,clientY:t.clientY});
    }
    isDrawing=false;
  },{passive:false});
  dc.addEventListener('click',clickHandle);
}
function finishDrawing(){
  const {x,y,w,h}=DRAW_AREA;
  S.drawnImg=D.getImageData(x,y,w,h);
  S.revMon=analyzeDrawing(S.drawnImg,S.selBook);
  dc.style.display='none';startReveal();
}
function analyzeDrawing(img,tier){
  const d=img.data;let r=0,g=0,b=0,total=0;
  for(let i=0;i<d.length;i+=4){if(d[i+3]>64){r+=d[i];g+=d[i+1];b+=d[i+2];total++;}}
  const density=total/(img.width*img.height);
  if(total<8) return{type:'water',name:'물방울이',hp:30,atk:8,def:6,spd:8,tier,special:null,maxHp:30};
  r/=total;g/=total;b/=total;
  let type;
  if(r>150&&r>g*1.3&&r>b*1.3) type='fire';
  else if(b>150&&b>r*1.3&&b>g*0.8) type='water';
  else if(g>130&&g>r*1.2&&g>b*1.2) type='grass';
  else if(r>130&&g>130&&b<90) type='electric';
  else{const mx=Math.max(r,g,b);type=mx===r?'fire':mx===b?'water':mx===g?'grass':'electric';}
  const mult={old:1,magic:1.3,legend:1.65}[tier]||1;
  const den=Math.min(density*6,1);
  const hp=Math.round((42+den*55)*mult);const atk=Math.round((11+den*18)*mult);
  const def=Math.round((8+den*13)*mult);const spd=Math.round((8+Math.random()*12)*mult);
  const pfx={fire:['파이어','플레임','인페르','버닝','블레이즈'],water:['아쿠아','워터','블루','마린','오션'],grass:['그린','리프','포레스','나투라','블룸'],electric:['썬더','볼트','스파크','라이트','제피르']};
  const sfx=['몬','드라','루스','가르','닉스','스피릿','번'];
  const name=pfx[type][Math.floor(Math.random()*5)]+sfx[Math.floor(Math.random()*sfx.length)];
  let special=null;
  if(tier==='legend'){const sp=['이중공격','방어태세','빠른발','독부여','재생력'];special=sp[Math.floor(Math.random()*sp.length)];}
  if(tier==='magic'&&Math.random()>0.5){const sp2=['속성강화','연속타격'];special=sp2[Math.floor(Math.random()*2)];}
  return{type,name,hp,maxHp:hp,atk,def,spd,tier,special};
}

// ── BATTLE ──
function startBattle(){
  const mon=S.revMon;if(!mon)return;
  S.myMons.push({...mon});
  S.myBMon={...mon};S.myBHp=mon.hp;S.myBMax=mon.hp;
  const wd=S.wild||WILD[0];
  S.enBMon={...wd,maxHp:wd.hp};S.enBHp=wd.hp;S.enBMax=wd.hp;
  S.bState='choose';S.bLog=['배틀 시작!',`적 ${wd.name} 등장!`,'기술을 선택하세요!'];S.bTimer=0;
  S.screen='battle';
}
function updateBattle(){
  S.bTimer++;
  if(S.bState==='animating'&&S.bTimer>55){S.bState='enemy';S.bTimer=0;}
  if(S.bState==='enemy'&&S.bTimer>55){
    const sk=SKILLS[S.enBMon.type][Math.floor(Math.random()*2)];
    const eff=(EFF[S.enBMon.type]||{})[S.myBMon.type]||1;
    const dmg=Math.max(1,Math.round((S.enBMon.atk-S.myBMon.def*0.25)*eff*(0.85+Math.random()*0.3)));
    S.myBHp=Math.max(0,S.myBHp-dmg);
    S.bLog=[`적 ${S.enBMon.name}의 ${sk}!`+(eff>1?' 효과가 굉장하다!':eff<1?' 별로인 것 같다...':''),`${S.myBMon.name}에게 ${dmg} 데미지!`];
    S.bState=S.myBHp<=0?'lose':'react';S.bTimer=0;
    if(S.bState==='lose') S.bLog=[...S.bLog,'쓰러졌다...'];
  }
  if(S.bState==='react'&&S.bTimer>70){S.bLog=['기술을 선택하세요!'];S.bState='choose';S.bTimer=0;}
  if((S.bState==='win'||S.bState==='lose')&&S.bTimer>130){
    if(S.bState==='win'){
      S.hp=Math.min(S.maxHp,S.hp+20);S.coins+=10;
      if(S.wild)S.wild.alive=false;
      const wasBoss=S.enBMon.isBoss;
      S.mobsDefeated++;
      if(wasBoss){
        // Stage clear!
        if(S.stage<2){S.stage++;S.mobsDefeated=0;initExplore();S.screen='explore';}
        else{S.screen='gameover';S.gameoverType='clear';} // shouldn't happen (boss 3 is unbeatable)
      } else {
        initExplore();S.screen='explore';
      }
    } else {
      S.hp=Math.max(1,S.hp-15);
      if(S.enBMon.isBoss&&S.stage===2){S.screen='gameover';S.gameoverType='lose';}
      else{initExplore();S.screen='explore';}
    }
    S.bTimer=0;
  }
}
function doBattleMove(idx){
  if(S.bState!=='choose')return;
  const sk=SKILLS[S.myBMon.type][idx];
  const eff=(EFF[S.myBMon.type]||{})[S.enBMon.type]||1;
  const dmg=Math.max(1,Math.round((S.myBMon.atk-S.enBMon.def*0.2)*eff*(0.85+Math.random()*0.3)));
  S.enBHp=Math.max(0,S.enBHp-dmg);
  let msg=`${S.myBMon.name}의 ${sk}!`+(eff>1?' 효과가 굉장하다!':eff<1?' 별로인 것 같다...':'');
  S.bLog=[msg,`${S.enBMon.name}에게 ${dmg} 데미지!`];
  if(S.enBHp<=0){S.bLog=[...S.bLog,`${S.enBMon.name}을(를) 쓰러뜨렸다!`,'🎉 승리!'];S.bState='win';}
  else S.bState='animating';
  S.bTimer=0;
}

    G.fillStyle='rgba(40,0,0,0.78)';G.fillRect(0,0,W,H);
    txt(S.enBMon.isBoss&&S.stage===2?'압도당했다...💀':'패배...💦',W/2,H/2-18,36,'#FF5555','center');
    txt(S.enBMon.isBoss&&S.stage===2?'빙하의 신은 넘사벽이었다':'다시 도전해보자!',W/2,H/2+26,13,'#ff8888','center');
  }
}

// ── GAMEOVER ──
function drawGameover(){
  const isLose=S.gameoverType==='lose';
  const gr=G.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,isLose?'#100005':'#001a00');gr.addColorStop(1,isLose?'#2a0010':'#002a10');
  G.fillStyle=gr;G.fillRect(0,0,W,H);
  // Particles
  for(let i=0;i<20;i++){
    const px2=(S.tick*0.7+i*32)%W;
    const py2=(S.tick*0.3+i*17)%H;
    G.fillStyle=isLose?`rgba(255,50,50,0.4)`:`rgba(100,255,100,0.4)`;
    G.fillRect(px2,py2,2,2);
  }
  G.shadowBlur=30;G.shadowColor=isLose?'#ff0044':'#00ff88';
  txt(isLose?'GAME OVER':'🎊 ALL CLEAR! 🎊',W/2,H/2-40,isLose?48:32,isLose?'#FF3366':'#FFD700','center');
  G.shadowBlur=0;
  txt(isLose?'빙하의 신에게 압도당했다...':'축하해! 두들몬 마스터!',W/2,H/2+4,14,isLose?'#ff8888':'#aaffaa','center');
  txt(`수집한 두들몬: ${S.myMons.length}마리`,W/2,H/2+30,12,'#aaaaff','center');
  if(Math.floor(S.tick/25)%2===0){
    bx(W/2-90,H/2+54,180,36,'#FFD700','#fff',2);
    txt('처음으로',W/2,H/2+78,16,'#1a0800','center');
  }
}
addEventListener('keydown',e=>{KEYS[e.code]=true;handleKey(e.code);});
addEventListener('keyup',e=>{KEYS[e.code]=false;});
function handleKey(code){
  if(S.screen==='title'&&(code==='Space'||code==='Enter'||code==='KeyZ')) startGame();
  if(S.screen==='reveal'&&S.revStep>=4&&(code==='Space'||code==='Enter'||code==='KeyZ')) startBattle();
  if(S.screen==='battle'&&S.bState==='choose'){
    if(code==='KeyZ') doBattleMove(0);
    if(code==='KeyX') doBattleMove(1);
  }
}
function handleGcClick(e){
  const {x,y}=localXY(e,gc);
  if(S.screen==='title'){startGame();return;}
  if(S.screen==='gameover'){startGame();return;}
  if(S.screen==='choice'){handleChoiceClick(x,y);return;}
  if(S.screen==='monselect'){handleMonSelectClick(x,y);return;}
  if(S.screen==='shop'){handleShopClick(x,y);return;}
  if(S.screen==='reveal'&&S.revStep>=4){startBattle();return;}
  if(S.screen==='battle'){
    if(S.bState==='choose'){
      if(x>W-210&&x<W-107&&y>H-82) doBattleMove(0);
      else if(x>W-107&&x<W&&y>H-82) doBattleMove(1);
    }
  }
  // 탐험 화면 D-pad는 touchstart/touchend로 처리
}
gc.addEventListener('click',handleGcClick);

// 모바일 D-pad: 길게 누르기 처리
gc.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.touches).forEach(t=>{
    const {x,y}=localXY(t,gc);
    if(S.screen==='explore'){
      if(x>8&&x<60&&y>H-50) TOUCH_BTN.left=true;
      else if(x>66&&x<118&&y>H-50) TOUCH_BTN.right=true;
      else if(x>W-64&&y>H-50) TOUCH_BTN.jump=true;
      else handleGcClick({clientX:t.clientX,clientY:t.clientY});
    } else {
      handleGcClick({clientX:t.clientX,clientY:t.clientY});
    }
  });
},{passive:false});
gc.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length===0){TOUCH_BTN.left=false;TOUCH_BTN.right=false;TOUCH_BTN.jump=false;}
  else{
    // 남은 터치 포인트 확인해서 버튼 상태 업데이트
    TOUCH_BTN.left=false;TOUCH_BTN.right=false;TOUCH_BTN.jump=false;
    Array.from(e.touches).forEach(t=>{
      const {x,y}=localXY(t,gc);
      if(x>8&&x<60&&y>H-50) TOUCH_BTN.left=true;
      if(x>66&&x<118&&y>H-50) TOUCH_BTN.right=true;
      if(x>W-64&&y>H-50) TOUCH_BTN.jump=true;
    });
  }
},{passive:false});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  TOUCH_BTN.left=false;TOUCH_BTN.right=false;TOUCH_BTN.jump=false;
  Array.from(e.touches).forEach(t=>{
    const {x,y}=localXY(t,gc);
    if(x>8&&x<60&&y>H-50) TOUCH_BTN.left=true;
    if(x>66&&x<118&&y>H-50) TOUCH_BTN.right=true;
    if(x>W-64&&y>H-50) TOUCH_BTN.jump=true;
  });
},{passive:false});

// ── FLOW ──
function startGame(){S.screen='explore';S.stage=0;S.coins=20;S.hp=100;S.maxHp=100;S.myMons=[];S.mobsDefeated=0;initExplore();}

// ── LOOP ──
function loop(){
  S.tick++;G.clearRect(0,0,W,H);
  switch(S.screen){
    case 'title':    drawTitle();break;
    case 'explore':  updateExplore();drawExplore();break;
    case 'choice':   drawChoice();break;
    case 'monselect':drawMonSelect();break;
    case 'shop':     drawShop();break;
    case 'draw':     drawDrawScreen();break;
    case 'reveal':   updateReveal();drawReveal();break;
    case 'battle':   updateBattle();drawBattle();break;
    case 'gameover': drawGameover();break;
  }
  requestAnimationFrame(loop);
}
setupDrawEvents();
document.fonts.load('16px NeoDGM').catch(()=>{}).finally(()=>loop());
</script>
